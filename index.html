<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>画像シフト管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">画像シフト管理</span>
      <span id="appStatus" class="badge text-bg-secondary">起動中</span>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <section class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label fw-bold">店舗</label>
            <select id="storePicker" class="form-select"></select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label fw-bold">日付</label>
            <select id="datePicker" class="form-select">
              <option value="">取得中...</option>
            </select>
          </div>
          <div class="col-12 col-md-6 d-grid d-md-flex gap-2 justify-content-md-end">
            <button id="reloadButton" class="btn btn-outline-primary rounded-pill">再読み込み</button>
            <button id="checkButton" class="btn btn-warning rounded-pill">画像確認</button>
            <button id="exportButton" class="btn btn-success rounded-pill">画像保存</button>
          </div>
        </div>
      </div>
    </section>

    <div id="alertArea"></div>

    <section id="captureArea" class="card shadow-sm mb-3">
      <div class="card-body">
        <div id="photoGrid" class="photo-grid">
          <div class="text-secondary text-center py-4">店舗と日付を選択してください</div>
        </div>
      </div>
    </section>

    <section class="card shadow-sm mb-3">
      <div class="card-header bg-white fw-bold">SIFT_DATA確認</div>
      <div class="card-body">
        <select id="siftPreviewSelect" class="form-select mb-2"></select>
        <pre id="siftPreviewBody" class="sift-preview mb-0"></pre>
      </div>
    </section>

    <section class="row g-3">
      <div class="col-12 col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white fw-bold text-primary">出勤中</div>
          <div id="activeList" class="list-group list-group-flush"></div>
        </div>
      </div>
      <div class="col-12 col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white fw-bold text-danger">休み設定</div>
          <div id="absentList" class="list-group list-group-flush"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="loading" class="loading d-none">
    <div class="spinner-border text-light" role="status"></div>
    <div id="loadingText" class="text-white fw-bold mt-2">処理中...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
